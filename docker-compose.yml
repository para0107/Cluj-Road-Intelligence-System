services:

  # ── PostgreSQL / PostGIS database ──────────────────────────────────────────
  db:
    image: postgis/postgis:15-3.3
    container_name: cluj_monitor_db
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Auto-create the schema on FIRST start (empty pgdata volume only).
      # Files here run once, inside POSTGRES_DB, before the backend connects.
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout:  5s
      retries:  5

  # ── FastAPI backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context:    .
      dockerfile: backend/Dockerfile
    container_name: cluj_monitor_backend
    restart: unless-stopped
    env_file: .env
    environment:
      # The backend container reaches the DB container by service name, not localhost.
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}

      # Container-side mount point for the shared data/ directory.
      PROJECT_DATA_DIR: /app/data

      # ── Auth ────────────────────────────────────────────────────────────
      # Signing key for JWTs. Override in .env for anything beyond local dev.
      JWT_SECRET: ${JWT_SECRET:-rids-dev-secret-change-me}
      # Seed admin (created at startup if missing). Defaults live in main.py;
      # set these in .env to override without touching code.
      ADMIN_USERNAME: ${ADMIN_USERNAME:-tudypara}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-tudorparaschiv04@yahoo.ro}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-costincnva2016}
      # Optional free Google OAuth client id (console.cloud.google.com);
      # leave empty to hide the Google button in the UI.
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}

    ports:
      - "8000:8000"
    volumes:
      # ── Shared data volume ───────────────────────────────────────────────
      - ./data:/app/data

    depends_on:
      db:
        condition: service_healthy

  # ── React / Vite frontend (served by Nginx) ─────────────────────────────────
  frontend:
    build:
      context:    .
      dockerfile: frontend/Dockerfile
    container_name: cluj_monitor_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
    driver: local