server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 10G;
    server_tokens off;

    # ── Compression ───────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/css application/javascript application/json image/svg+xml
               application/wasm text/plain;

    # ── Live-mode WebSocket ───────────────────────────────────────────────────
    # /api/live/ws needs the Upgrade handshake and a long read timeout.
    location /api/live/ws {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── API reverse proxy ─────────────────────────────────────────────────────
    # Forward /api/* requests to the FastAPI backend container.
    # The "backend" hostname resolves via Docker's internal DNS.
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Hashed build assets: cache forever ────────────────────────────────────
    # Vite fingerprints every file under /assets/, so contents never change
    # for a given URL. New deploys ship new hashes.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── SPA fallback + security headers ──────────────────────────────────────
    # All other routes are handled by React Router. Security headers live on
    # the document response (CSP governs the page, not the sub-resources).
    #
    # CSP allowances, each deliberate:
    #   script-src   Google Identity (optional login button), wasm for the
    #                in-browser assistant (WebLLM/transformers.js).
    #   style-src    inline style objects are the app's styling model; Google
    #                Fonts + Leaflet CSS from unpkg are linked in index.html.
    #   img-src      CARTO/Esri map tiles, data:/blob: for generated icons.
    #   connect-src  same-origin API/WS, Google token check, Hugging Face CDN
    #                hosts for the assistant's local model downloads, GitHub
    #                raw for WebLLM's precompiled model libraries.
    #   worker-src   WebLLM runs inference in a blob: worker.
    location / {
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(self), camera=(), microphone=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'wasm-unsafe-eval' https://accounts.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://unpkg.com https://accounts.google.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://*.basemaps.cartocdn.com https://basemaps.cartocdn.com https://server.arcgisonline.com https://unpkg.com; connect-src 'self' https://accounts.google.com https://huggingface.co https://*.huggingface.co https://*.hf.co https://raw.githubusercontent.com; worker-src 'self' blob:; frame-src https://accounts.google.com; object-src 'none'; base-uri 'self'; frame-ancestors 'none'" always;
        try_files $uri $uri/ /index.html;
    }
}
